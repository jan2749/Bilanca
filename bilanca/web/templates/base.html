<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Bilanca{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <img class="brand-mark" src="/static/logo-mark.svg" alt="" width="28" height="28">
      <span>Bilanca</span>
    </a>
    {% if user %}
    <nav>
      <a href="/">Pregled</a>
      <a href="/stats">Statistika</a>
      <a href="/transactions">Transakcije</a>
      <a href="/connect">Banka</a>
      <a href="/import">Uvoz</a>
    </nav>
    <form class="logout" action="/logout" method="post">
      <span class="muted small">{{ user.email }}</span>
      <button type="submit" class="secondary">Odjava</button>
    </form>
    {% endif %}
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
