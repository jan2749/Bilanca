<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Bilanca{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">Bilanca</a>
    {% if user %}
    <nav>
      <a href="/">Pregled</a>
      <a href="/stats">Statistika</a>
      <a href="/transactions">Transakcije</a>
      <a href="/import">Uvoz</a>
    </nav>
    <form class="logout" action="/logout" method="post">
      <span class="muted small">{{ user.email }}</span>
      <button type="submit" class="secondary">Odjava</button>
    </form>
    {% endif %}
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
