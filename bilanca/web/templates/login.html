{% extends "base.html" %}
{% block title %}Prijava · Bilanca{% endblock %}
{% block content %}
<div class="auth-card card">
  <h1>Prijava</h1>
  {% if error %}<p class="neg">{{ error }}</p>{% endif %}
  <form action="/login" method="post" class="auth-form">
    <label>E-naslov
      <input type="email" name="email" value="{{ email or '' }}" required autofocus>
    </label>
    <label>Geslo
      <input type="password" name="password" required>
    </label>
    <button type="submit">Prijava</button>
  </form>
  <p class="muted small">Še nimaš računa? <a class="link-arrow" href="/register">Registracija →</a></p>
</div>
{% endblock %}
